<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Página de Captura</title>
<style>
  :root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;color:#111}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:linear-gradient(135deg,#f6f8ff,#fff)}
  .card{width:100%;max-width:420px;background:#fff;padding:28px;border-radius:12px;box-shadow:0 8px 28px rgba(16,24,40,.08)}
  h1{margin:0 0 8px;font-size:20px}
  p.lead{margin:0 0 16px;color:#475569}
  label{display:block;margin:12px 0 6px;font-size:13px;color:#0f172a}
  input{width:100%;padding:10px 12px;border:1px solid #e6e9ef;border-radius:8px;font-size:14px}
  .row{display:flex;gap:8px}
  button{margin-top:16px;background:#0b84ff;color:#fff;padding:10px 14px;border:none;border-radius:9px;cursor:pointer;font-weight:600}
  button.secondary{background:#eef2ff;color:#0b3b8a;border:1px solid #e5e7f3}
  .meta{margin-top:12px;color:#6b7280;font-size:13px}
  .list{margin-top:18px}
  .item{padding:8px 10px;border-radius:8px;border:1px dashed #e6eefc;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .small{font-size:13px;color:#334155}
  .error{color:#b91c1c;font-size:13px;margin-top:8px}
  .success{color:#065f46;font-size:13px;margin-top:8px}
  footer{margin-top:18px;font-size:12px;color:#94a3b8;text-align:center}
</style>
</head>
<body>
  <main class="card" role="main">
    <h1>Assine nossa lista</h1>
    <p class="lead">Receba novidades e ofertas exclusivas diretamente por e-mail.</p>

    <label for="name">Nome</label>
    <input id="name" type="text" autocomplete="name" placeholder="Seu nome" />

    <label for="email">E‑mail</label>
    <input id="email" type="email" autocomplete="email" placeholder="seu@exemplo.com" />

    <div class="row">
      <button id="submit">Receber novidades</button>
      <button id="export" class="secondary" type="button">Exportar CSV</button>
    </div>

    <div id="msg" aria-live="polite"></div>

    <div class="list" id="contactsList" hidden>
      <h2 style="font-size:15px;margin:8px 0">Contatos salvos</h2>
      <div id="items"></div>
    </div>

    <div class="meta">Garantimos apenas armazenamento local (IndexedDB) neste exemplo.</div>
    <footer>© <span id="year"></span></footer>
  </main>

<script>
/* IndexedDB simples para armazenar contatos (idb-like mínimo) */
const DB_NAME = 'captura-db';
const DB_VERSION = 1;
const STORE_NAME = 'contatos';
let db;

function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        const store = d.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
        store.createIndex('email', 'email', { unique: true });
        store.createIndex('createdAt', 'createdAt');
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function addContact(contact){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.add(contact);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function getAllContacts(){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function deleteContact(id){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = (e) => reject(e.target.error);
  });
}

/* Utilitários */
function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function showMessage(text, type='info'){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
}

/* Renderização da lista */
async function refreshList(){
  const list = document.getElementById('contactsList');
  const items = document.getElementById('items');
  items.innerHTML = '';
  try {
    const contatos = await getAllContacts();
    if (!contatos || contatos.length === 0) { list.hidden = true; return; }
    list.hidden = false;
    contatos.sort((a,b)=>b.createdAt - a.createdAt);
    for (const c of contatos){
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div>
          <div class="small"><strong>${escapeHtml(c.name||'—')}</strong></div>
          <div class="small" style="color:#64748b">${escapeHtml(c.email)}</div>
        </div>
        <div style="text-align:right">
          <div class="small" style="color:#94a3b8">${new Date(c.createdAt).toLocaleString()}</div>
          <button data-id="${c.id}" style="margin-top:8px;background:#fff;border:1px solid #e6e9ef;padding:6px 8px;border-radius:8px;cursor:pointer">Remover</button>
        </div>
      `;
      const btn = div.querySelector('button');
      btn.addEventListener('click', async () => {
        await deleteContact(c.id);
        showMessage('Contato removido.', 'success');
        await refreshList();
      });
      items.appendChild(div);
    }
  } catch (err) {
    console.error(err);
    showMessage('Erro ao carregar contatos.', 'error');
  }
}

/* Exportar CSV */
async function exportCSV(){
  try {
    const contatos = await getAllContacts();
    if (!contatos || contatos.length===0) { showMessage('Nenhum contato para exportar.', 'error'); return; }
    const header = ['id','name','email','createdAt'];
    const rows = contatos.map(c => [c.id, c.name||'', c.email, new Date(c.createdAt).toISOString()]);
    const csv = [header, ...rows].map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'contatos.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showMessage('CSV gerado para download.', 'success');
  } catch (e) {
    console.error(e);
    showMessage('Falha ao exportar CSV.', 'error');
  }
}

/* Evitar XSS ao inserir texto */
function escapeHtml(s){
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* Inicialização e eventos */
document.getElementById('year').textContent = new Date().getFullYear();

(async function init(){
  try {
    await openDB();
    await refreshList();
  } catch (e) {
    console.error(e);
    showMessage('IndexedDB não disponível neste navegador.', 'error');
  }

  document.getElementById('submit').addEventListener('click', async () => {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase();
    if (!email) { showMessage('Informe um e‑mail válido.', 'error'); return; }
    if (!validateEmail(email)) { showMessage('Formato de e‑mail inválido.', 'error'); return; }
    try {
      await addContact({ name, email, createdAt: Date.now() });
      showMessage('Obrigado! E‑mail salvo.', 'success');
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      await refreshList();
    } catch (err) {
      // tratar erro de duplicata de e-mail
      if (err && err.name === 'ConstraintError') {
        showMessage('Este e‑mail já está cadastrado.', 'error');
      } else {
        console.error(err);
        showMessage('Erro ao salvar e‑mail.', 'error');
      }
    }
  });

  document.getElementById('export').addEventListener('click', exportCSV);

  // Atalho: enter no campo do e-mail
  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('submit').click();
    }
  });
})();
</script>
